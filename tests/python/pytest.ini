[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v 
    --tb=short
    --strict-markers
    --ignore=node_modules
    --ignore=.venv
    --ignore=venv
markers =
    integration: marks tests as integration (requires external services like ffmpeg, ComfyUI)
    slow: marks tests as slow (takes > 5 seconds to run)
    requires_ffmpeg: marks tests requiring ffmpeg installation
    requires_comfyui: marks tests requiring ComfyUI cloud service
    requires_gpu: marks tests requiring GPU for processing
    unit: marks unit tests (fast, no external dependencies)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
